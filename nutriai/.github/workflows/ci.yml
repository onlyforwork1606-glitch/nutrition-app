name: CI

# Lint + typecheck + test + build on every push.
# Deployment is handled by the Cloudflare Dashboard's Git integration
# (see docs/Cloudflare-Deployment.md) — it builds and deploys automatically
# after a successful push, so there is no separate deploy job here.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nutriai
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nutriai/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Worker typecheck
        run: npm run typecheck --workspace nutriai-worker

      - name: Worker tests
        run: npm run test --workspace nutriai-worker

      - name: Build
        run: npm run build
