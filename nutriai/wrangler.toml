name = "nutriai"
compatibility_date = "2024-11-01"
pages_build_output_dir = "dist"

[build]
command = "npm run build"

[dev]
command = "npm run dev"
port = 5173

# Cloudflare D1 database (optional backend)
[[d1_databases]]
binding = "DB"
database_name = "nutriai"
database_id = "REPLACE_WITH_YOUR_D1_ID"

# Cloudflare R2 bucket for meal images (optional backend)
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "nutriai-images"
