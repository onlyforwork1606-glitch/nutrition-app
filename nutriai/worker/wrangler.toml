name = "nutrition-app"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Serve the built PWA as static assets (SPA fallback to index.html).
# Build with `npm run build` from the repo root before deploying.
[assets]
directory = "../dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# D1 database (binding name "DB") is bound in the Cloudflare Dashboard:
#   Worker → Settings → Variables and Secrets → Add → D1 database
#   Create a database named "nutriai" and bind it with the name "DB".
# wrangler.toml cannot reference a D1 database without its id (which only
# exists after the resource is created), so it is intentionally not listed
# here. The database schema self-initializes on first request (see
# src/services/db.ts), so no migration step is required at deploy time.

# R2 bucket for meal / temp images. Create a bucket named "nutriai-images"
# (or bind an existing one with the binding name "IMAGES").
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "nutriai-images"

# KV namespace (binding name "KV") is bound in the Cloudflare Dashboard:
#   Worker → Settings → Variables and Secrets → Add → KV namespace
#   Bind it with the name "KV" (used for rate limiting and OAuth state).
# Like D1, a KV namespace id is only known after creation, so it is not
# listed here. The app treats a missing KV as a no-op so it still boots.

# Durable Object for per-user coach memory cache.
[[durable_objects.bindings]]
name = "COACH_DO"
class_name = "CoachDurable"

[[migrations]]
tag = "v1"
new_classes = ["CoachDurable"]

# Background jobs: weekly report (Mon 9am UTC) + monthly report (1st 9am UTC).
[triggers]
crons = ["0 9 * * 1", "0 9 1 * *"]

# Secrets are set in the Cloudflare Dashboard (or `wrangler secret put`):
#   OPENROUTER_API_KEY, SESSION_SECRET, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET,
#   USDA_API_KEY (optional), SENTRY_DSN (optional, enables prod error monitoring)
#
# Variables
[vars]
ENVIRONMENT = "production"
OPENROUTER_BASE_URL = "https://openrouter.ai/api/v1"
